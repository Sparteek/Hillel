[loggers]
keys=root,api

[handlers]
keys=consoleHandler,fileHandler

[formatters]
keys=sampleFormatter, apiConsoleFormatter

[logger_root]
level=DEBUG
handlers=consoleHandler


[logger_api]
level=INFO
handlers=fileHandler, consoleHandler
qualname=api
propagate=0

[handler_consoleHandler]
class=StreamHandler
level=DEBUG
formatter=apiConsoleFormatter
args=(sys.stdout,)

[handler_fileHandler]
class=FileHandler
level=DEBUG
formatter=sampleFormatter
args=('example.log',)

[formatter_sampleFormatter]
format=%(name)s - %(asctime)s - %(levelname)s - %(message)s
datefmt=%Y-%m-%d %H:%M:%S


[formatter_apiConsoleFormatter]
format=%(name)s::%(asctime)s:[%(levelname)s] - %(message)s
datefmt=%Y-%m-%d %H:%M:%S